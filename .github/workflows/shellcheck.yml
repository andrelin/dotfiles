name: ShellCheck
on: [push]

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Run ShellCheck
        run: |
          shellcheck --version
          failed=0
          for f in bin/dotfiles bin/eachdir bin/isip \
                   init/*.sh source/*.sh test/*.sh \
                   link/.bashrc link/.bash_profile; do
            echo "--- $f ---"
            shellcheck -x -s bash --severity=warning "$f" || failed=1
          done
          exit $failed
