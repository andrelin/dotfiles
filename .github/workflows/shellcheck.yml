name: ShellCheck
on: [push]

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run ShellCheck
        run: |
          shellcheck --version
          failed=0
          for f in bin/dotfiles bin/eachdir bin/isip \
                   init/*.sh source/*.sh test/*.sh \
                   link/.bashrc link/.bash_profile; do
            echo "--- $f ---"
            shellcheck -x -s bash --severity=warning "$f" || failed=1
          done
          exit $failed
