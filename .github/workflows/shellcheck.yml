name: ShellCheck
on: [push]

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run ShellCheck
        run: |
          shellcheck --version
          failed=0
          for f in bin/dotfiles bin/eachdir bin/isip \
                   init/*.sh source/*.sh test/*.sh \
                   link/.bashrc link/.bash_profile; do
            echo "--- $f ---"
            shellcheck -x -s bash --severity=warning "$f" || failed=1
          done
          exit $failed
